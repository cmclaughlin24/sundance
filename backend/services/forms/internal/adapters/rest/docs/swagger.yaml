definitions:
  APIErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
      statusCode:
        type: integer
    type: object
  APIResponse-FormResponse:
    properties:
      data:
        $ref: '#/definitions/FormResponse'
      message:
        type: string
    type: object
  APIResponse-FormVersionResponse:
    properties:
      data:
        $ref: '#/definitions/FormVersionResponse'
      message:
        type: string
    type: object
  APIResponse-SubmissionResponse:
    properties:
      data:
        $ref: '#/definitions/SubmissionResponse'
      message:
        type: string
    type: object
  APIResponse-TagResponse:
    properties:
      data:
        $ref: '#/definitions/TagResponse'
      message:
        type: string
    type: object
  APIResponse-TagVersionResponse:
    properties:
      data:
        $ref: '#/definitions/TagVersionResponse'
      message:
        type: string
    type: object
  CreateTagRequest:
    properties:
      displayName:
        type: string
      key:
        type: string
    type: object
  FieldRequest:
    properties:
      attributes:
        type: object
      key:
        maxLength: 25
        type: string
      name:
        maxLength: 250
        type: string
      position:
        maximum: 50
        minimum: 0
        type: number
      rules:
        items:
          $ref: '#/definitions/RuleRequest'
        type: array
      tags:
        items:
          $ref: '#/definitions/upsertFieldTagMappingRequest'
        type: array
      type:
        type: string
    required:
    - attributes
    - key
    - name
    - type
    type: object
  FieldResponse:
    properties:
      attributes:
        type: object
      id:
        type: string
      key:
        type: string
      name:
        type: string
      position:
        type: number
      rules:
        items:
          $ref: '#/definitions/RuleResponse'
        type: array
      tags:
        items:
          $ref: '#/definitions/FieldTagMappingResponse'
        type: array
      type:
        type: string
    type: object
  FieldTagMappingResponse:
    properties:
      createdAt:
        type: string
      fieldId:
        type: string
      id:
        type: string
      priority:
        type: integer
      tagVersionId:
        type: string
      updatedAt:
        type: string
    type: object
  FormResponse:
    properties:
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      tenantId:
        type: string
      updatedAt:
        type: string
    type: object
  FormVersionResponse:
    properties:
      createdAt:
        type: string
      formId:
        type: string
      id:
        type: string
      pages:
        items:
          $ref: '#/definitions/PageResponse'
        type: array
      publishedAt:
        type: string
      publishedById:
        type: string
      retiredAt:
        type: string
      retiredById:
        type: string
      status:
        $ref: '#/definitions/FormVersionStatus'
      updatedAt:
        type: string
      version:
        type: integer
    type: object
  FormVersionStatus:
    enum:
    - draft
    - active
    - retired
    type: string
    x-enum-varnames:
    - FormVersionStatusDraft
    - FormVersionStatusActive
    - FormVersionStatusRetired
  PageRequest:
    properties:
      key:
        maxLength: 25
        type: string
      name:
        maxLength: 75
        type: string
      position:
        maximum: 10
        minimum: 0
        type: number
      rules:
        items:
          $ref: '#/definitions/RuleRequest'
        type: array
      sections:
        items:
          $ref: '#/definitions/SectionRequest'
        type: array
    required:
    - key
    - name
    type: object
  PageResponse:
    properties:
      id:
        type: string
      key:
        type: string
      name:
        type: string
      position:
        type: number
      rules:
        items:
          $ref: '#/definitions/RuleResponse'
        type: array
      sections:
        items:
          $ref: '#/definitions/SectionResponse'
        type: array
    type: object
  RuleExpressionRequest:
    properties:
      fieldKey:
        type: string
      joinWithPrevious:
        type: string
      operator:
        type: string
      position:
        minimum: 0
        type: number
      value: {}
    required:
    - fieldKey
    - operator
    type: object
  RuleExpressionResponse:
    properties:
      fieldKey:
        type: string
      joinWithPrevious:
        type: string
      operator:
        type: string
      position:
        type: number
      value: {}
    type: object
  RuleRequest:
    properties:
      expressions:
        items:
          $ref: '#/definitions/RuleExpressionRequest'
        type: array
      type:
        type: string
    required:
    - type
    type: object
  RuleResponse:
    properties:
      expressions:
        items:
          $ref: '#/definitions/RuleExpressionResponse'
        type: array
      id:
        type: string
      type:
        $ref: '#/definitions/RuleType'
    type: object
  RuleType:
    enum:
    - visible
    - required
    - readonly
    type: string
    x-enum-varnames:
    - RuleTypeVisible
    - RuleTypeRequired
    - RuleTypeReadOnly
  SectionRequest:
    properties:
      fields:
        items:
          $ref: '#/definitions/FieldRequest'
        type: array
      key:
        maxLength: 25
        type: string
      name:
        maxLength: 75
        type: string
      position:
        maximum: 10
        minimum: 0
        type: number
      rules:
        items:
          $ref: '#/definitions/RuleRequest'
        type: array
    required:
    - key
    - name
    type: object
  SectionResponse:
    properties:
      fields:
        items:
          $ref: '#/definitions/FieldResponse'
        type: array
      id:
        type: string
      key:
        type: string
      name:
        type: string
      position:
        type: number
      rules:
        items:
          $ref: '#/definitions/RuleResponse'
        type: array
    type: object
  SubmissionFieldValueDto:
    properties:
      fieldId:
        type: string
      value: {}
    required:
    - fieldId
    - value
    type: object
  SubmissionRequest:
    properties:
      formId:
        type: string
      values:
        items:
          $ref: '#/definitions/SubmissionFieldValueDto'
        type: array
      versionId:
        type: string
    required:
    - formId
    - versionId
    type: object
  SubmissionResponse:
    properties:
      createdAt:
        type: string
      formId:
        type: string
      id:
        type: string
      referenceId:
        type: string
      status:
        $ref: '#/definitions/SubmissionStatus'
      tenantId:
        type: string
      updatedAt:
        type: string
      values:
        items:
          $ref: '#/definitions/SubmissionFieldValueDto'
        type: array
      versionId:
        type: string
    type: object
  SubmissionStatus:
    enum:
    - pending
    - accepted
    - rejected
    - failed
    type: string
    x-enum-varnames:
    - SubmissionStatusPending
    - SubmissionStatusAccepted
    - SubmissionStatusRejected
    - SubmissionStatusFailed
  TagResponse:
    properties:
      createdAt:
        type: string
      displayName:
        type: string
      id:
        type: string
      key:
        type: string
      updatedAt:
        type: string
    type: object
  TagStatus:
    enum:
    - draft
    - active
    - deprecated
    - retired
    type: string
    x-enum-varnames:
    - TagStatusDraft
    - TagStatusActive
    - TagStatusDeprecated
    - TagStatusRetired
  TagVersionResponse:
    properties:
      createdAt:
        type: string
      deprecatedAt:
        type: string
      id:
        type: string
      publishedAt:
        type: string
      retiredAt:
        type: string
      status:
        $ref: '#/definitions/TagStatus'
      tagId:
        type: string
      type:
        type: string
      version:
        type: integer
    type: object
  UpdateTagRequest:
    properties:
      displayName:
        type: string
    type: object
  UpsertFormRequest:
    properties:
      description:
        maxLength: 500
        type: string
      name:
        maxLength: 75
        type: string
    required:
    - name
    type: object
  UpsertFormVersionRequest:
    properties:
      pages:
        items:
          $ref: '#/definitions/PageRequest'
        type: array
    type: object
  UpsertTagVersionRequest:
    properties:
      type:
        type: string
    required:
    - type
    type: object
  upsertFieldTagMappingRequest:
    properties:
      priority:
        type: integer
      tagVersionId:
        type: string
    type: object
info:
  contact: {}
paths:
  /forms:
    get:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/FormResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all forms
      tags:
      - Forms
    post:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Create Form
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/UpsertFormRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/APIResponse-FormResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a form
      tags:
      - Forms
  /forms/{formId}:
    delete:
      consumes:
      - application/json
      description: All versions belonging to the form will also be deleted.
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Form ID
        in: path
        name: formId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a form
      tags:
      - Forms
    get:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Form ID
        in: path
        name: formId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/FormResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a form by ID
      tags:
      - Forms
    put:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Form ID
        in: path
        name: formId
        required: true
        type: string
      - description: Update Form
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/UpsertFormRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse-FormResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a form
      tags:
      - Forms
  /forms/{formId}/versions:
    get:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Form ID
        in: path
        name: formId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/FormVersionResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all versions
      tags:
      - Forms
    post:
      consumes:
      - application/json
      description: The pages field defines the structure of the form version including
        sections, fields, and validation rules.
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Form ID
        in: path
        name: formId
        required: true
        type: string
      - description: Create Version
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/UpsertFormVersionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/APIResponse-FormVersionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a version
      tags:
      - Forms
  /forms/{formId}/versions/{versionId}:
    get:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Form ID
        in: path
        name: formId
        required: true
        type: string
      - description: Version ID
        in: path
        name: versionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/FormVersionResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a version by ID
      tags:
      - Forms
    put:
      consumes:
      - application/json
      description: Only draft versions can be updated. Published or retired versions
        are locked.
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Form ID
        in: path
        name: formId
        required: true
        type: string
      - description: Version ID
        in: path
        name: versionId
        required: true
        type: string
      - description: Update Version
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/UpsertFormVersionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse-FormVersionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a version
      tags:
      - Forms
  /forms/{formId}/versions/{versionId}/publish:
    post:
      consumes:
      - application/json
      description: Transitions a draft version to published status. Only one version
        per form can be published at a time.
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Form ID
        in: path
        name: formId
        required: true
        type: string
      - description: Version ID
        in: path
        name: versionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse-FormVersionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Publish a version
      tags:
      - Forms
  /forms/{formId}/versions/{versionId}/retire:
    post:
      consumes:
      - application/json
      description: Transitions a published version to retired status, making it no
        longer active.
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Form ID
        in: path
        name: formId
        required: true
        type: string
      - description: Version ID
        in: path
        name: versionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/APIResponse-FormVersionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Retire a version
      tags:
      - Forms
  /submissions:
    get:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/SubmissionResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all Submissions
      tags:
      - Submissions
    post:
      consumes:
      - application/json
      description: Accepts a form submission for asynchronous processing. An Idempotency-Key
        header is required to prevent duplicate submissions.
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Idempotency Key
        in: header
        name: Idempotency-Key
        required: true
        type: string
      - description: Create Submission
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/SubmissionRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/APIResponse-SubmissionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a submission
      tags:
      - Submissions
  /submissions/{submissionId}/replay:
    post:
      consumes:
      - application/json
      description: Re-publishes the submission event for reprocessing by downstream
        consumers.
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Submission ID
        in: path
        name: submissionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/APIResponse-SubmissionResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Replay a submission
      tags:
      - Submissions
  /submissions/by-reference/{referenceId}:
    get:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Reference ID
        in: path
        name: referenceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SubmissionResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a submission by reference ID
      tags:
      - Submissions
  /submissions/by-reference/{referenceId}/status:
    get:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Reference ID
        in: path
        name: referenceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              status:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a submission status
      tags:
      - Submissions
  /tags:
    get:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/TagResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all tags
      tags:
      - Tags
    post:
      consumes:
      - application/json
      description: Creates a new tag for the tenant. The key must be unique within
        the tenant and is used as the stable identifier for tag-to-field associations.
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Create Tag
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/CreateTagRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/APIResponse-TagResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a tag
      tags:
      - Tags
  /tags/{tagId}:
    delete:
      consumes:
      - application/json
      description: Deletes a tag. Deletion is only permitted when a tag version has
        never been associated with any form field, in order to preserve historical
        context.
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Tag ID
        in: path
