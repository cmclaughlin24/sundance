definitions:
  APIErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
      statusCode:
        type: integer
    type: object
  APIResponse-SubmissionResponse:
    properties:
      data:
        $ref: '#/definitions/SubmissionResponse'
      message:
        type: string
    type: object
  SubmissionRequest:
    properties:
      formId:
        type: string
      payload:
        type: object
      versionId:
        type: string
    required:
    - formId
    - payload
    - versionId
    type: object
  SubmissionResponse:
    properties:
      createdAt:
        type: string
      formId:
        type: string
      id:
        type: string
      payload:
        type: object
      referenceId:
        type: string
      status:
        $ref: '#/definitions/SubmissionStatus'
      tenantId:
        type: string
      updatedAt:
        type: string
      versionId:
        type: string
    type: object
  SubmissionStatus:
    enum:
    - pending
    - accepted
    - rejected
    type: string
    x-enum-varnames:
    - SubmissionStatusPending
    - SubmissionStatusAccepted
    - SubmissionStatusRejected
info:
  contact: {}
paths:
  /submissions:
    get:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/SubmissionResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      summary: Get all Submissions
      tags:
      - Submissions
    post:
      consumes:
      - application/json
      description: Accepts a form submission for asynchronous processing. An Idempotency-Key
        header is required to prevent duplicate submissions.
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Idempotency Key
        in: header
        name: Idempotency-Key
        required: true
        type: string
      - description: Create Submission
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/SubmissionRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/APIResponse-SubmissionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      summary: Create a submission
      tags:
      - Submissions
  /submissions/{submissionId}/replay:
    post:
      consumes:
      - application/json
      description: Re-publishes the submission event for reprocessing by downstream
        consumers.
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Submission ID
        in: path
        name: submissionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/APIResponse-SubmissionResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      summary: Replay a submission
      tags:
      - Submissions
  /submissions/by-reference/{referenceId}:
    get:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Reference ID
        in: path
        name: referenceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/SubmissionResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      summary: Get a submission by reference ID
      tags:
      - Submissions
  /submissions/by-reference/{referenceId}/status:
    get:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      - description: Reference ID
        in: path
        name: referenceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              status:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/APIErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      summary: Get a submission status
      tags:
      - Submissions
swagger: "2.0"
