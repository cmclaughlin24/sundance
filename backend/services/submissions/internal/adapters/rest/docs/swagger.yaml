definitions:
  APIErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
      statusCode:
        type: integer
    type: object
  SubmissionResponse:
    properties:
      createdAt:
        type: string
      formId:
        type: string
      id:
        type: string
      payload: {}
      referenceId:
        type: string
      status:
        $ref: '#/definitions/SubmissionStatus'
      tenantId:
        type: string
      updatedAt:
        type: string
      versionId:
        type: string
    type: object
  SubmissionStatus:
    enum:
    - pending
    - accepted
    - rejected
    type: string
    x-enum-varnames:
    - SubmissionStatusPending
    - SubmissionStatusAccepted
    - SubmissionStatusRejected
info:
  contact: {}
paths:
  /submissions:
    get:
      consumes:
      - application/json
      parameters:
      - description: Tenant ID
        in: header
        name: X-Tenant-ID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/SubmissionResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/APIErrorResponse'
      summary: Get all Submissions
      tags:
      - Submissions
swagger: "2.0"
