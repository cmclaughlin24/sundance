services:
  mongo:
    image: mongo:latest
    restart: always
    command: ["--replSet", "rs0"]
    volumes:
      - "mongodb:/data/db"
    healthcheck:
      test: >
        mongosh --eval "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }"
      interval: 10s
      start_period: 10s
  mongo-express:
    image: mongo-express:latest
    ports:
      - "3000:8081"
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: user
      ME_CONFIG_BASICAUTH_PASSWORD: password
      ME_CONFIG_OPTIONS_EDITORTHEME: ambiance
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
    depends_on:
      - mongo
  forms:
    build:
      context: ./backend
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE: forms
    ports:
      - 8080:80
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - ./backend/services/submissions
            - ./backend/services/tenants
        - action: rebuild
          path: ./backend/services/forms/go.mod
    depends_on:
      - mongo
  submissions:
    build:
      context: ./backend
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE: submissions
    ports:
      - 8081:80
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - ./backend/services/forms
            - ./backend/services/tenants
        - action: rebuild
          path: ./backend/services/submissions/go.mod
  tenants:
    build:
      context: ./backend
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE: tenants
    ports:
      - 8082:80
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - ./backend/services/forms
            - ./backend/services/submissions
        - action: rebuild
          path: ./backend/services/tenants/go.mod
    depends_on:
      - mongo
volumes:
  mongodb:
