services:
  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 4200:8080
  mongo:
    image: mongo:latest
    restart: always
    command: ["--replSet", "rs0"]
    volumes:
      - "mongodb:/data/db"
    healthcheck:
      test: >
        mongosh --eval "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }"
      interval: 10s
      start_period: 10s
    depends_on:
      - dozzle
  mongo-express:
    image: mongo-express:latest
    ports:
      - "3000:8081"
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: user
      ME_CONFIG_BASICAUTH_PASSWORD: password
      ME_CONFIG_OPTIONS_EDITORTHEME: ambiance
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
    depends_on:
      - dozzle
      - mongo
  redis:
    image: redis
    ports:
      - "6379:6379"
    volumes:
      - redis:/data
    depends_on:
      - dozzle
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    depends_on:
      - dozzle
  forms:
    build:
      context: ./backend
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE: forms
    ports:
      - 8080:80
    environment:
      APP_PORT: 80
      APP_LOG_LEVEL: debug
      APP_SERVER_HOST: http://localhost:8080
      APP_DATABASE_DRIVER: mongodb
      APP_DATABASE_MONGODB_URI: mongodb://mongo:27017
      APP_DATABASE_MONGODB_DATABASE_NAME: forms
      APP_CACHE_TYPE: redis
      APP_CACHE_REDIS_HOST: redis
      APP_CACHE_REDIS_PORT: 6379
      APP_WORKER_INTERVAL: 1
      APP_WORKER_POOL_SIZE: 10
      APP_WORKER_RETRY_LIMIT: 5
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - ./backend/services/submissions
            - ./backend/services/tenants
        - action: rebuild
          path: ./backend/services/forms/go.mod
    depends_on:
      - dozzle
      - mongo
      - redis
      - kafka
  tenants:
    build:
      context: ./backend
      dockerfile: ./docker/Dockerfile.dev
      args:
        SERVICE: tenants
    ports:
      - 8081:80
    environment:
      APP_PORT: 80
      APP_LOG_LEVEL: debug
      APP_SERVER_HOST: http://localhost:8081
      APP_DATABASE_DRIVER: mongodb
      APP_DATABASE_MONGODB_URI: mongodb://mongo:27017
      APP_DATABASE_MONGODB_DATABASE_NAME: tenants
      APP_CACHE_TYPE: redis
      APP_CACHE_REDIS_HOST: redis
      APP_CACHE_REDIS_PORT: 6379
      APP_WORKER_INTERVAL: 1
      APP_WORKER_POOL_SIZE: 10
      APP_WORKER_RETRY_LIMIT: 5
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - ./backend/services/forms
            - ./backend/services/submissions
        - action: rebuild
          path: ./backend/services/tenants/go.mod
    depends_on:
      - dozzle
      - mongo
      - redis
volumes:
  mongodb:
  redis:
